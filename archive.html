<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ARCHIVE — PSYHOSISCLUB</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="artist.css">
    <link rel="stylesheet" href="archive.css">
</head>
<body>

<audio id="bgMusic" src="back2.mp3" loop></audio>

<header>
    <div class="logo" onclick="goTo('main.html')">PSYHOSISCLUB</div>
    <nav>
        <a onclick="goTo('artist.html')">ARTISTS</a>
        <a onclick="goTo('releases.html')">RELEASES</a>
        <a onclick="goTo('archive.html')">ARCHIVE</a>
    </nav>
    <div class="header-right">
        <a onclick="goTo('Contact.html')">CONTACT</a>
    </div>
</header>

<div class="burger" onclick="toggleMenu()">
    <span></span><span></span><span></span>
</div>
<div class="mobile-nav" id="mobileNav">
    <a onclick="goTo('artist.html'); toggleMenu()">ARTISTS</a>
    <a onclick="goTo('releases.html'); toggleMenu()">RELEASES</a>
    <a onclick="goTo('archive.html'); toggleMenu()">ARCHIVE</a>
    <a onclick="goTo('Contact.html'); toggleMenu()">CONTACT</a>
</div>

<main>
    <div class="archive-tabs">
        <button class="tab-btn active" onclick="switchTab('art')">ART</button>
        <button class="tab-btn" onclick="switchTab('merch')">MERCH</button>
    </div>

    <div class="tab-content active" id="tab-art">
        <div class="art-grid" id="artGrid">
            <!-- Добавляй арты сюда:
            <div class="art-item"><img src="art1.webp" loading="lazy"></div>
            -->
            <div class="coming-soon">coming soon</div>
        </div>
    </div>

    <div class="tab-content" id="tab-merch">
        <div class="merch-grid">
            <!-- Добавляй мерч сюда:
            <div class="merch-card" onclick="window.open('ссылка', '_blank')">
                <div class="merch-cover">
                    <img src="merch1.webp">
                    <div class="merch-placeholder">♦</div>
                    <div class="merch-hover"><span>SHOP</span></div>
                </div>
                <p class="merch-title">название</p>
                <p class="merch-price">¥ 0000</p>
            </div>
            -->
            <div class="coming-soon">coming soon</div>
        </div>
    </div>
</main>

<div class="lightbox" id="lightbox">
    <span class="lightbox-close" onclick="closeLightbox()">close</span>
    <span class="lightbox-prev" onclick="lightboxNav(-1)">←</span>
    <img id="lightboxImg" src="" alt="">
    <span class="lightbox-next" onclick="lightboxNav(1)">→</span>
</div>

<script src="script.js"></script>
<script src="archive.js"></script>
</body>
</html>
